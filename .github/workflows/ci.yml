name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: "pytest / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libegl1 libxkbcommon0 libdbus-1-3

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra pyside6

      - name: Run tests
        run: uv run pytest --tb=short

  package-windows:
    name: "package / Windows portable"
    if: github.event_name == 'push'
    needs: test
    runs-on: windows-2022
    permissions:
      contents: write
    env:
      QT_BACKEND: pyside6

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install packaging dependencies
        run: uv sync --frozen --extra pyside6 --extra package

      - name: Build portable package
        shell: pwsh
        run: .\tools\build_windows_package.ps1

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: h-denoise-windows-x64
          path: dist/h-denoise-windows-x64-v*.zip
          if-no-files-found: error

      - name: Upload package to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $asset = Get-ChildItem -Path "dist" -Filter "h-denoise-windows-x64-v*.zip" | Select-Object -First 1
          if (-not $asset) {
            throw "Package zip not found"
          }
          $meta = & "$env:GITHUB_WORKSPACE/tools/github_release_metadata.ps1" -Tag $tag
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $repo --title $meta.Title --notes $meta.Notes
          }
          else {
            gh release edit $tag --repo $repo --title $meta.Title --notes $meta.Notes
          }
          gh release upload $tag $asset.FullName --repo $repo --clobber
