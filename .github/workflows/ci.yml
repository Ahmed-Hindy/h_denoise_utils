name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: "pytest / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libegl1 libxkbcommon0 libdbus-1-3

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra pyside6

      - name: Run tests
        run: uv run pytest --tb=short

  package-windows:
    name: "package / Windows portable"
    if: github.event_name == 'push'
    needs: test
    runs-on: windows-latest
    env:
      QT_BACKEND: pyside6

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install packaging dependencies
        run: uv sync --frozen --extra pyside6 --extra package

      - name: Build portable package
        shell: pwsh
        run: .\tools\build_windows_package.ps1

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: h-denoise-windows-x64
          path: dist/h-denoise-windows-x64-v*.zip
          if-no-files-found: error
